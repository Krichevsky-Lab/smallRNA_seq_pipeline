[workspace]
name = "smallrna-seq-pipeline"
version = "0.1.0"
description = "Pipeline for small RNA-seq reanalysis with tRNA fragment profiling"
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64"]

[dependencies]
grep = "*"
gzip = "*"
gawk = "==5.2.2"
wget = "==1.21.4"
cutadapt = "4.4.*"
fastqc = "==0.12.1"
multiqc = "==1.31"
bowtie = "1.3.1.*"
bowtie2 = "==2.5.4"
samtools = "==1.22.1"
r-base = "==4.4.3"
r-tidyverse = "==2.0.0"
subread = "==2.1.1"
r-fs = "*"
r-scales = "*"
bioconductor-rsamtools = "==2.22.0"
bioconductor-deseq2 = "*"
bioconductor-genomicranges = "*"
