[workspace]
name = "smallrna-seq-pipeline"
version = "0.1.0"
description = "Pipeline for small RNA-seq reanalysis with tRNA fragment profiling"
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64"]

[dependencies]
bash = "5.2.21.*"
coreutils = "9.4.*"
gawk = "5.2.2.*"
sed = "4.9.*"
grep = "3.11.*"
gzip = "1.12.*"
wget = "1.21.4.*"
sra-tools = "3.0.3.*"
cutadapt = "4.4.*"
fastqc = "0.12.1.*"
multiqc = "1.31.*"
bowtie = "1.3.1.*"
bowtie2 = "2.5.4.*"
samtools = "1.22.1.*"
r-base = "4.4.3.*"
r-tidyverse = "2.0.0.*"
"r-data.table" = "1.17.8.*"
